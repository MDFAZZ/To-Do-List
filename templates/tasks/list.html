{% extends 'base.html' %}

{% block title %}Task List - To-Do List Application{% endblock %}

{% block content %}
<div class="task-list-container">
    <div class="header-section">
        <h2>All Tasks</h2>
        <a href="{% url 'add_task' %}" class="btn btn-primary">+ Add New Task</a>
    </div>
    
    <div id="loading-message" class="loading">Loading tasks...</div>
    <div id="error-message" class="error-message" style="display: none;"></div>
    
    <div id="tasks-container">
        <!-- Tasks will be dynamically loaded here via JavaScript -->
    </div>
    
    <div id="no-tasks-message" class="no-tasks" style="display: none;">
        <p>No tasks found. <a href="{% url 'add_task' %}">Create your first task!</a></p>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    /**
     * Load and display all tasks from the API
     */
    async function loadTasks() {
        const loadingEl = document.getElementById('loading-message');
        const errorEl = document.getElementById('error-message');
        const tasksContainer = document.getElementById('tasks-container');
        const noTasksEl = document.getElementById('no-tasks-message');
        
        try {
            loadingEl.style.display = 'block';
            errorEl.style.display = 'none';
            tasksContainer.innerHTML = '';
            noTasksEl.style.display = 'none';
            
            const response = await fetch('/api/tasks');
            const result = await response.json();
            
            loadingEl.style.display = 'none';
            
            if (result.success) {
                const tasks = result.data || [];
                
                if (tasks.length === 0) {
                    noTasksEl.style.display = 'block';
                } else {
                    tasks.forEach(task => {
                        const taskCard = createTaskCard(task);
                        tasksContainer.appendChild(taskCard);
                    });
                }
            } else {
                throw new Error(result.message || 'Failed to load tasks');
            }
        } catch (error) {
            loadingEl.style.display = 'none';
            errorEl.textContent = `Error: ${error.message}`;
            errorEl.style.display = 'block';
            console.error('Error loading tasks:', error);
        }
    }
    
    /**
     * Create a task card element
     */
    function createTaskCard(task) {
        const card = document.createElement('div');
        card.className = `task-card ${task.status}`;
        card.dataset.taskId = task.id;
        
        const statusClass = task.status === 'completed' ? 'status-completed' : 'status-pending';
        const statusIcon = task.status === 'completed' ? '✓' : '○';
        
        card.innerHTML = `
            <div class="task-header">
                <h3 class="task-title">${escapeHtml(task.title)}</h3>
                <span class="task-status ${statusClass}">${statusIcon} ${task.status}</span>
            </div>
            ${task.description ? `<p class="task-description">${escapeHtml(task.description)}</p>` : ''}
            ${task.due_date ? `<p class="task-due-date">📅 Due: ${escapeHtml(task.due_date)}</p>` : ''}
            <div class="task-footer">
                <span class="task-date">Created: ${formatDate(task.created_at)}</span>
                <div class="task-actions">
                    <button onclick="toggleTaskStatus(${task.id})" class="btn btn-small">
                        ${task.status === 'completed' ? 'Mark Pending' : 'Mark Complete'}
                    </button>
                    <button onclick="deleteTask(${task.id})" class="btn btn-small btn-danger">Delete</button>
                </div>
            </div>
        `;
        
        return card;
    }
    
    /**
     * Toggle task status between pending and completed
     */
    async function toggleTaskStatus(taskId) {
        try {
            const taskCard = document.querySelector(`[data-task-id="${taskId}"]`);
            const currentStatus = taskCard.classList.contains('completed') ? 'completed' : 'pending';
            const newStatus = currentStatus === 'completed' ? 'pending' : 'completed';
            
            const response = await fetch(`/api/tasks/${taskId}/update/`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ status: newStatus })
            });
            
            const result = await response.json();
            
            if (result.success) {
                loadTasks(); // Reload tasks to reflect changes
            } else {
                alert(`Error: ${result.message}`);
            }
        } catch (error) {
            alert(`Error updating task: ${error.message}`);
            console.error('Error toggling task status:', error);
        }
    }
    
    /**
     * Delete a task
     */
    async function deleteTask(taskId) {
        if (!confirm('Are you sure you want to delete this task?')) {
            return;
        }
        
        try {
            const response = await fetch(`/api/tasks/${taskId}/delete/`, {
                method: 'DELETE'
            });
            
            const result = await response.json();
            
            if (result.success) {
                loadTasks(); // Reload tasks to reflect changes
            } else {
                alert(`Error: ${result.message}`);
            }
        } catch (error) {
            alert(`Error deleting task: ${error.message}`);
            console.error('Error deleting task:', error);
        }
    }
    
    /**
     * Utility function to escape HTML
     */
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    /**
     * Format date for display
     */
    function formatDate(dateString) {
        if (!dateString) return 'N/A';
        const date = new Date(dateString);
        return date.toLocaleString();
    }
    
    // Load tasks when page loads
    document.addEventListener('DOMContentLoaded', loadTasks);
</script>
{% endblock %}
